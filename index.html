<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Programme Force</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
  <div class="hdr">
    <h1>Programme Force &amp; Skills</h1>
    <p class="sub" id="streakDisplay"></p>
  </div>

  <div class="nx nx-a" id="nx">
    <div class="nx-in">
      <p class="nx-l">Prochaine séance</p>
      <div class="nx-t" id="nxT">SÉANCE A</div>
      <p class="nx-f" id="nxF"></p>
      <p class="nx-d" id="nxD"></p>
      <p class="nx-w" id="nxW"></p>
      <button class="nx-btn" id="nxBtn">Saisir cette séance</button>
      <button class="nx-skip" id="skipBtn">Passer cette séance</button>
    </div>
  </div>

  <div class="tc act" id="tProgram"><div id="pC"></div></div>
  <div class="tc" id="tLog"><div id="lC"></div></div>
  <div class="tc" id="tJournal"><div id="jC"></div></div>
  <div class="tc" id="tStats"><div id="sC"></div></div>
  <div class="tc" id="tSettings">
    <div class="cd">
      <div class="cd-h"><h2>Export &amp; Sauvegarde</h2></div>
      <div class="cd-b">
        <div class="stng">
          <button class="ebtn" id="exBtn">📥 Exporter en CSV (Google Sheets)</button>
          <div class="ex-row">
            <button class="ebtn ebtn-s" id="expCodeBtn">📋 Exporter par code</button>
            <button class="ebtn ebtn-s" id="impCodeBtn">📂 Importer un code</button>
          </div>
        </div>
      </div>
    </div>
    <div class="cd">
      <div class="cd-h"><h2>Badges</h2></div>
      <div class="cd-b" id="badgesSettings">Chargement...</div>
    </div>
    <div class="ftr"><p>Données sauvegardées automatiquement</p><p><a class="rst-link" id="rstBtn">Tout effacer</a></p></div>
  </div>

  <nav class="nav">
    <button class="nav-btn act" data-t="program">
      <span class="nav-icon">📋</span>
      Programme
    </button>
    <button class="nav-btn" data-t="log">
      <span class="nav-icon">💪</span>
      Saisir
    </button>
    <button class="nav-btn" data-t="journal">
      <span class="nav-icon">📖</span>
      Journal
    </button>
    <button class="nav-btn" data-t="stats">
      <span class="nav-icon">📊</span>
      Stats
    </button>
    <button class="nav-btn" data-t="settings">
      <span class="nav-icon">⚙️</span>
      Réglages
    </button>
  </nav>
</div>

<div class="modal" id="modal">
  <div class="modal-bg" id="modalBg"></div>
  <div class="modal-c" id="modalContent">
    <h3>Restaurer des données</h3>
    <p>Colle le code reçu par WhatsApp</p>
    <textarea id="codeInput" rows="4" placeholder="Colle le code ici..."></textarea>
    <div class="modal-acts">
      <button class="ebtn ebtn-p" id="restoreBtn">Restaurer</button>
      <button class="ebtn" id="modalCancel">Annuler</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/badges.js"></script>
<script src="js/chrono.js"></script>
<script src="js/log.js"></script>
<script src="js/journal.js"></script>
<script src="js/stats.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
