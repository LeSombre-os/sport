<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Force</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
  <!-- TAB 1: PROGRAMME -->
  <div class="tc act" id="tProgram">
    <div class="hdr"><h1>Programme Force</h1></div>
    <div id="nextSession" class="card" style="padding:18px 20px;text-align:center;margin-bottom:14px"></div>
    <div id="calendar"></div>
    <div id="programExercises"></div>
    <div id="streakDisplay" style="margin-top:10px"></div>
  </div>

  <!-- TAB 2: SAISIR -->
  <div class="tc" id="tLog">
    <div id="logContent"></div>
  </div>

  <!-- TAB 3: PARAMÈTRES -->
  <div class="tc" id="tSettings">
    <div class="hdr"><h1>Paramètres</h1></div>
    <div id="settingsStreak"></div>
    <div class="card" style="padding:16px;margin-bottom:12px">
      <h3 style="font-family:var(--ff-h);font-weight:700;font-size:.95rem;margin-bottom:12px">Données</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn" id="expCodeBtn">Exporter par code</button>
        <button class="btn" id="impCodeBtn">Importer un code</button>
      </div>
    </div>
    <div class="card" style="padding:16px">
      <p style="font-size:.72rem;color:var(--text3);margin-bottom:8px">Version 3.0</p>
      <button class="btn btn-d" id="rstBtn">Tout effacer</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn act" data-t="program">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Programme
    </button>
    <button class="nav-btn" data-t="log">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Saisir
    </button>
    <button class="nav-btn" data-t="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Paramètres
    </button>
  </nav>
</div>

<div class="modal" id="modal"><div class="modal-bg" id="modalBg"></div><div class="modal-c" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/log.js"></script>
<script src="js/app.js"></script>
</body>
</html>
